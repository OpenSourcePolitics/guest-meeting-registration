on:
  workflow_call:
    inputs:
      folder:
        required: true
        type: string

jobs:
  test-report:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_PASSWORD: postgres
    env:
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      RUBY_VERSION: 3.3.4

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      - run: |
          sudo apt update
          sudo apt install libu2f-udev imagemagick
          wget --no-verbose -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb
          rm /tmp/chrome.deb
      - uses: nanasess/setup-chromedriver@v2

      - name: Setup Database
        run: bundle exec rake test_app

      - run: |
          rm -f ./spec/decidim_dummy_app/app/services/dummy_signature_handler.rb
          rm -f ./spec/decidim_dummy_app/app/services/dummy_sms_mobile_phone_validator.rb
        name: Remove Initiative-dependent dummy files

      - name: Run RSpec
        run: bundle exec rspec ${{ inputs.folder }}
        env:
          SIMPLECOV: 1
          CODECOV: 1
          
      - uses: codecov/codecov-action@v4
        name: Upload coverage
        with:
          token: ${{ inputs.codecov_token }}
          name: ${{ inputs.folder }}
          flags: ${{ inputs.folder }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: ./spec/decidim_dummy_app/tmp/screenshots
